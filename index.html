<!DOCTYPE html>
<html>
<body>
  <h1>Pusher Test</h1>
  <p>Check the browser console (F12) to see the connection status.</p>

  <script src="https://js.pusher.com"></script>
  <script>
    // Enable logging to see the "wss://" connection happening in the background
    Pusher.logToConsole = true;

    const pusher = new Pusher('846a8ecc1c9ff82b697d', {
      cluster: 'us3',
      forceTLS: true
    });

    const channel = pusher.subscribe('my-channel');
    channel.bind('my-event', (data) => {
      alert('Received: ' + JSON.stringify(data));
    });
  </script>
</body>
</html>
